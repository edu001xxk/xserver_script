name: Simple Keepalive

on:
  schedule:
    # 每月 1号和 15号 运行一次，刚好卡在 60 天限制内
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

# 必须加上这个权限声明，让默认的 GITHUB_TOKEN 有推送代码的资格
permissions:
  contents: write

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create a dummy commit
        run: |
          # 1. 告诉 Git 机器人叫什么名字
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 把当前时间写入一个叫 keepalive.log 的文件里（如果文件不存在会自动创建）
          echo "Last keepalive run: $(date)" > keepalive.log
          
          # 3. 提交并推送到仓库
          git add -f keepalive.log
          # 如果没有任何更改就不提交，避免报错退出 (|| exit 0 是精髓)
          git commit -m "Auto keepalive to prevent suspension" || exit 0
          git push